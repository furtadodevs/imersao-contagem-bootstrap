<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Login | Imersão Contagem</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
         .logo {
    width: 200px;
}
        /* ===========================
GERAL
=========================== */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {

            background-image: url("./img/fundo2.png");
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            color: #343a40;

        }

        /* ===========================
CARD
=========================== */

        .login-box {

            width: 100%;
            max-width: 980px;

            background: #fff;

            border: 1px solid #dee2e6;

            box-shadow: 0 12px 30px rgba(0, 0, 0, .08);

            overflow: hidden;

        }

        /* ===========================
LADO ESQUERDO
=========================== */

        .lado-esquerdo {

            background-image: url("./img/fundo.png");
            color: white;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            text-align: center;

            padding: 60px;

        }

        .lado-esquerdo i {

            font-size: 70px;
            margin-bottom: 25px;

        }

        .lado-esquerdo h1 {

            font-size: 2.2rem;
            font-weight: 700;

            margin-bottom: 20px;

        }

        .lado-esquerdo p {

            max-width: 320px;

            line-height: 1.7;

            opacity: .9;

        }

        /* ===========================
FORMULÁRIO
=========================== */

        .lado-direito {

            padding: 60px;

        }

        .user-icon {

            font-size: 70px;
            color: #3c206f

        }

        h2 {

            font-weight: 600;

            margin-top: 15px;

        }

        .text-muted {

            margin-bottom: 35px;

        }

        /* ===========================
INPUTS
=========================== */

        .form-label {

            font-weight: 500;

            margin-bottom: 8px;

        }

        .form-control {

            height: 48px;

            border-radius: 4px;

            border: 1px solid #ced4da;

            padding: 10px 14px;

            transition: .25s;

        }

        .form-control:focus {

            border-color: #6f42c1;

            box-shadow: 0 0 0 .18rem rgba(111, 66, 193, .15);

        }

        .input-group .btn {

            border-radius: 0;

        }

        /* ===========================
BOTÃO
=========================== */

        .btn-login {

            background: #6f42c1;

            color: white;

            height: 48px;

            border: none;

            border-radius: 4px;

            font-weight: 600;

            transition: .3s;

        }

        .btn-login:hover {

            background: #59359c;

            color: white;

        }

        /* ===========================
LINKS
=========================== */

        a {

            color: #6f42c1;
            text-decoration: none;

        }

        a:hover {

            text-decoration: underline;

        }

        /* ===========================
RESPONSIVO
=========================== */

        @media(max-width:768px) {

            .lado-esquerdo {

                display: none;

            }

            .lado-direito {

                padding: 35px;

            }

            .login-box {

                margin: 20px;

            }

        }
    </style>

</head>

<body>

    <div class="container">

        <div class="row login-box">

            <div class="col-md-6 lado-esquerdo">

                <img src="./img/logo.png" alt="Logo" class="logo mb-5">

                <h1>Imersão Contagem</h1>

                <p>
                    Conectando pessoas, eventos e oportunidades através da tecnologia.
                </p>

            </div>

            <div class="col-md-6 lado-direito">

                <div class="text-center mb-4">

                    <i class="bi bi-person-circle user-icon"></i>

                    <h2 class="mt-3">Entrar</h2>

                    <p class="text-muted">
                        Faça login para continuar
                    </p>

                </div>

                <form action="inicio.html">

                    <div class="mb-3">

                        <label>Email</label>

                        <input type="email" class="form-control" placeholder="Digite seu email">

                    </div>

                    <div class="mb-3">

                        <label>Senha</label>

                        <input type="password" id="senha" class="form-control" placeholder="Digite sua senha">

                    </div>

                    <div class="d-flex justify-content-between mb-4">

                        <div class="form-check">

                            <input class="form-check-input" type="checkbox">

                            <label class="form-check-label">

                                Lembrar-me

                            </label>

                        </div>

                        <a href="#">

                            Esqueci minha senha

                        </a>

                    </div>


                    <button type="submit" class="btn btn-login w-100">
                        Entrar
                    </button>
                
                </form>

                <hr>

                <p class="text-center">

                    Não possui conta?

                    <a href="#">

                        Cadastre-se

                    </a>

                </p>

            </div>

        </div>

    </div>

</body>

</html>
