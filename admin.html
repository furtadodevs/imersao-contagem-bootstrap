<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastrar Evento</title>

    <!-- Bootstrap 5.0.2 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./admin.css">
  

</head>


<body>


<!-- MENU LATERAL -->

<div class="sidebar">

    <div class="logo-area ms-3 my-4">

        <h3>
            IMERSÃO CONTAGEM
        </h3>

        <span>
            Painel Administrativo
        </span>

    </div>
    
    <a href="#">Dashboard </a>





    <a 
    data-bs-toggle="collapse" 
    href="#menuEventos"
    role="button">

    Eventos

    <span>
        ^
    </span>

</a>


<div class="collapse show" id="menuEventos">


    <a href="#" class="ms-3 submenu">
        Todos eventos
    </a>


    <a href="#" class="ms-3 submenu ativo">
        Cadastrar evento

       
    </a>


    <a href="#" class="ms-3 submenu">
        Categorias
    </a>


</div>



    <a href="#">Usuários</a>

    <a href="#">Organizadores</a>

    <a href="#">Locais</a>

    <a href="#">Relatórios</a>

    <a href="#">Configurações</a>

</div>




<!-- CONTEÚDO -->

<div class="content">


    <!-- HEADER -->

    <header class="header">

        <button id="btnMenu" class="btn">
            ☰
        </button>


        <div>
            Administrador
        </div>

    </header>




    <main class="container-fluid p-4">


        <h2>
            Cadastrar evento
        </h2>

        <p class="text-muted">
            Início / Eventos / Cadastrar
        </p>



        <!-- FORMULÁRIO -->

        <div class="card-form mt-4">


            <h4 class="mb-4">
                Informações do evento
            </h4>



            <form>


                <div class="row g-3">


                    <!-- titulo -->

                    <div class="col-md-6">

                        <label class="form-label">
                            Título do evento
                        </label>

                        <input 
                        type="text"
                        class="form-control"
                        placeholder="Festival de Inverno">

                    </div>



                    <!-- categoria -->

                    <div class="col-md-3">

                        <label class="form-label">
                            Categoria
                        </label>

                        <select class="form-select">

                            <option>
                                Escolha
                            </option>

                            <option>
                                Música
                            </option>

                            <option>
                                Cultura
                            </option>

                        </select>

                    </div>


                    <div class="col-md-6">


                        <label class="form-label">
                            Descrição completa
                        </label>


                        <textarea 
                        class="form-control"
                        rows="5">
                        </textarea>


                    </div>




                    <!-- imagem -->


                    <div class="col-md-6">


                        <label class="form-label">
                            Imagem de capa
                        </label>


                        <input 
                        type="file"
                        class="form-control">


                    </div>


                    <!-- data -->


                    <div class="col-md-3">


                        <label class="form-label">
                            Data
                        </label>


                        <input 
                        type="date"
                        class="form-control">


                    </div>




                    <!-- hora -->


                    <div class="col-md-3">


                        <label class="form-label">
                            Horário
                        </label>


                        <input 
                        type="time"
                        class="form-control">


                    </div>






                    <div class="col-md-6">


                        <label class="form-label">
                            Local do evento
                        </label>


                        <input
                        class="form-control"
                        placeholder="Praça da Jabuticaba">


                    </div>





                    <div class="col-md-6">


                        <label class="form-label">
                            Endereço
                        </label>


                        <input
                        class="form-control"
                        placeholder="Rua, número, cidade">


                    </div>





                    <div class="col-md-4">

                        <label class="form-label">
                            Telefone
                        </label>

                        <input
                        class="form-control">

                    </div>




                    <div class="col-md-4">

                        <label class="form-label">
                            Email
                        </label>

                        <input
                        class="form-control">

                    </div>



                    <div class="col-md-4">

                        <label class="form-label">
                            Site
                        </label>

                        <input
                        class="form-control">

                    </div>



                </div>



                <div class="mt-4 text-end">


                    <button 
                    type="button"
                    class="btn btn-outline-secondary">

                        Cancelar

                    </button>



                    <button 
                    class="btn btn-purple">

                        Publicar evento

                    </button>



                </div>



            </form>


        </div>



    </main>


</div>





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script>

    const btnMenu = document.getElementById("btnMenu");
    
    const sidebar = document.querySelector(".sidebar");
    
    const content = document.querySelector(".content");
    
    
    btnMenu.addEventListener("click", () => {
    
    
        sidebar.classList.toggle("fechado");
    
    
        content.classList.toggle("expandido");
    
    
    });
    
    
    </script>


</body>

</html>
